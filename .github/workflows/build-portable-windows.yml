name: Build Portable Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-portable-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - quiz_set: default
            artifact_name: uzbek-quiz-windows-portable
            base_name: uzbek-quiz-windows-portable
          - quiz_set: accounting-practice
            artifact_name: uzbek-quiz-windows-portable-accounting-practice
            base_name: uzbek-quiz-windows-portable-accounting-practice

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Build portable app
        run: npm run tauri:build:portable -- ${{ matrix.quiz_set }}

      - name: Package portable app
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target -Recurse -Filter 'uzbek_quiz_tauri.exe' | Select-Object -First 1
          if (-not $exe) {
            throw 'Portable exe not found.'
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $baseName = '${{ matrix.base_name }}'
          $exeName = "$baseName.exe"
          $zip = "dist/$baseName.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Copy-Item $exe.FullName "dist/$exeName"
          Compress-Archive -Path "dist/$exeName" -DestinationPath $zip

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.base_name }}.exe
            dist/${{ matrix.base_name }}.zip
